name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm --dir artifacts/nibrras typecheck

      - name: Frontend build
        run: pnpm --dir artifacts/nibrras build

      - name: Backend typecheck
        run: pnpm --dir artifacts/api-server typecheck

      - name: Backend build
        run: pnpm --dir artifacts/api-server build
