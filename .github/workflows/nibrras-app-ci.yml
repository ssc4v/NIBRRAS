name: NIBRRAS App CI

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/nibrras/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/nibrras-app-ci.yml'
  pull_request:
    paths:
      - 'artifacts/nibrras/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

concurrency:
  group: nibrras-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libraries
        run: pnpm run typecheck:libs

      - name: Typecheck NIBRRAS
        run: pnpm --dir artifacts/nibrras typecheck

      - name: Build NIBRRAS
        run: pnpm --dir artifacts/nibrras build
        env:
          PORT: 22127
          BASE_PATH: /

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: nibrras-dist
          path: artifacts/nibrras/dist
          if-no-files-found: error
          retention-days: 7
